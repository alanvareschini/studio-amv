    <!-- Resolve a preferencia de movimento antes do CSS, canvas e WebGL. -->
    <script>
      (function () {
        var mode = "auto";
        try {
          var savedMode = localStorage.getItem("amv-motion-mode");
          if (savedMode === "auto" || savedMode === "full" || savedMode === "balanced" || savedMode === "reduced") mode = savedMode;
          if (sessionStorage.getItem("amv-skip-intro-once") === "1") {
            sessionStorage.removeItem("amv-skip-intro-once");
            document.documentElement.dataset.skipMotionIntro = "true";
          }
        } catch (e) {}
        var systemReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        var coarsePointer = window.matchMedia && window.matchMedia("(pointer: coarse), (max-width: 760px)").matches;
        var memory = navigator.deviceMemory;
        var cores = navigator.hardwareConcurrency;
        var saveData = navigator.connection && navigator.connection.saveData;
        var tier = "balanced";
        if (mode === "full") tier = "high";
        else if (mode === "reduced" || (mode === "auto" && systemReduced)) tier = "low";
        else if (mode === "balanced") tier = "balanced";
        else if (saveData || memory <= 2 || cores <= 4 || (coarsePointer && memory <= 4)) tier = "low";
        else if (!coarsePointer && memory >= 8 && cores >= 8) tier = "high";
        var hardwareTier = tier;
        if (mode === "auto") {
          try {
            var runtimeSaved = JSON.parse(sessionStorage.getItem("amv-runtime-performance-tier") || "null");
            var runtimeTier = runtimeSaved && runtimeSaved.tier;
            var runtimeFresh = runtimeSaved && typeof runtimeSaved.at === "number" && Date.now() - runtimeSaved.at < 1800000;
            var rank = { low: 0, balanced: 1, high: 2 };
            if (runtimeFresh && typeof runtimeTier === "string" && runtimeTier in rank && rank[runtimeTier] < rank[tier]) tier = runtimeTier;
          } catch (e) {}
        }
        document.documentElement.dataset.motionPreference = mode;
        document.documentElement.dataset.motion = mode === "reduced" || (mode === "auto" && systemReduced)
          ? "reduced"
          : "full";
        document.documentElement.dataset.performanceTier = tier;
        document.documentElement.dataset.hardwareTier = hardwareTier;
        document.documentElement.dataset.performanceSource = mode === "auto" && tier !== hardwareTier
          ? "runtime"
          : mode === "auto" ? "detected" : "manual";
      })();
    </script>

  <body class="ci-lock ci-site-hidden is-intro-pending">
    <div id="clothintro" class="ci-boot" role="button" tabindex="0" aria-label="Puxe a corda para entrar">
      <canvas id="ci-canvas"></canvas>
    </div>
    <script>
      window.__amvClothIntro = function () {
        var host = document.getElementById("clothintro");
        var canvas = document.getElementById("ci-canvas");
        var raf = 0;
        var resizeTimer = 0;
        var bootMinTimer = 0;
        var bootFallbackTimer = 0;
        var finished = false;
        var bootMinElapsed = false;
        var visualsReady = false;

        function finishNow() {
          if (finished) return;
          finished = true;
          if (raf) cancelAnimationFrame(raf);
          if (bootMinTimer) clearTimeout(bootMinTimer);
          if (bootFallbackTimer) clearTimeout(bootFallbackTimer);
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
          window.removeEventListener("pointercancel", onUp);
          window.removeEventListener("visibilitychange", onVisibility);
          window.removeEventListener("amv:visuals-ready", onVisualsReady);
          if (host) {
            host.removeEventListener("lostpointercapture", onUp);
            host.removeEventListener("pointerleave", onLeave);
          }
          window.removeEventListener("resize", onResize);
          window.removeEventListener("blur", cancelInteraction);
          if (host && host.parentNode) host.remove();
          document.body.classList.remove("ci-lock");
          revealSite();
        }

        if (!host || !canvas || !canvas.getContext) { finishNow(); return true; }
        if (document.documentElement.dataset.skipMotionIntro === "true") { finishNow(); return true; }
        if (document.documentElement.dataset.motion === "reduced") { finishNow(); return true; }

        var ctx = canvas.getContext("2d", { alpha: true });
        if (!ctx) { finishNow(); return true; }

        var CHARS = " AMV WEB STUDIO SITES QUE VENDEM ";
        var CODE_CHARS = " </>  {}  ()  =>  #01 ";
        var BANDS = 5;
        var PUR = [168, 85, 247], CYA = [34, 211, 238], GRN = [0, 255, 136];
        var W = 0, H = 0, dpr = 1, SP = 26;
        var qualityTier = document.documentElement.dataset.performanceTier || "balanced";
        var GRAV = 0.16, DAMP_ACTIVE = 0.988, DAMP_IDLE = 0.982, DAMP_CORD = 0.95;
        var ITERS = qualityTier === "low" ? 4 : 5;
        var COMPRESS = 0.22, STRETCH = 1.42, H_COMPRESS = 0.38, H_STRETCH = 3.4;
        var HOME_RETURN_ACTIVE = 0.0025, HOME_RETURN_IDLE = 0.009;
        var HOME_SNAP_DISTANCE = 0.45, HOME_SNAP_SPEED = 0.08;
        var MOUSE_STRENGTH = 0.78;
        var STEP_MS = 1000 / 60, MAX_STEPS = 2;
        var curtains = [], cord = [], handle = null, bandImg = [];
        var glyphAtlas = null, glyphSize = 0, handleColor = "";
        var opening = false, openT = 0, started = performance.now(), lastT = started, acc = 0;
        var siteRevealed = false;
        var ptr = {
          x: -9999,
          y: -9999,
          active: false,
          vx: 0,
          vy: 0,
          pointerId: null,
          pointerType: "mouse",
          cordGrab: false,
          cordParticle: null,
          cordParticleWasPinned: false,
          cordStartY: 0,
          cordArmed: false,
          cordPeakY: 0,
          cordReturnParticle: null,
          cordReleaseY: 0,
          cordReturnStartedAt: 0,
          cordWaitingReturn: false,
          particle: null,
          particleWasPinned: false
        };

        function mix(a, b, t) {
          return [
            a[0] + (b[0] - a[0]) * t,
            a[1] + (b[1] - a[1]) * t,
            a[2] + (b[2] - a[2]) * t
          ];
        }
        function grad(t) {
          var c = t < 0.5 ? mix(PUR, CYA, t * 2) : mix(CYA, GRN, (t - 0.5) * 2);
          return "rgb(" + (c[0] | 0) + "," + (c[1] | 0) + "," + (c[2] | 0) + ")";
        }
        function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

        function charAtGrid(row, x) {
          var phrase = row % 4 === 2 ? CODE_CHARS : CHARS;
          var offset = row % 3 === 0 ? 0 : row % 3 === 1 ? 4 : 8;
          return phrase[(Math.round(x / Math.max(1, SP)) + offset) % phrase.length];
        }

        function makeChars(fs) {
          bandImg = [];
          var chars = [];
          var seen = {};
          for (var ci = 0; ci < CHARS.length; ci++) {
            var candidate = CHARS[ci];
            if (candidate === " " || seen[candidate]) continue;
            seen[candidate] = 1;
            chars.push(candidate);
          }
          glyphSize = Math.ceil(fs * 1.72);
          glyphAtlas = document.createElement("canvas");
          glyphAtlas.width = Math.max(1, glyphSize * chars.length);
          glyphAtlas.height = Math.max(1, glyphSize * BANDS);
          var atlasContext = glyphAtlas.getContext("2d");
          atlasContext.font = "bold " + fs + "px monospace";
          atlasContext.textAlign = "center";
          atlasContext.textBaseline = "middle";

          for (var bi = 0; bi < BANDS; bi++) {
            var col = grad(bi / (BANDS - 1));
            var map = {};
            atlasContext.fillStyle = col;
            for (var i = 0; i < chars.length; i++) {
              var ch = chars[i];
              var sx = i * glyphSize;
              var sy = bi * glyphSize;
              atlasContext.fillText(ch, sx + glyphSize / 2, sy + glyphSize / 2);
              map[ch] = { x: sx, y: sy };
            }
            bandImg.push(map);
          }
          handleColor = grad(0.5);
        }

        function makeCurtain(x0, x1, dir) {
          var width = x1 - x0;
          var gap = SP;
          var cols = Math.max(12, Math.min(W < 640 ? 22 : 48, Math.floor(width / gap) + 1));
          var rows = Math.max(22, Math.min(W < 640 ? 64 : 52, Math.ceil(H / gap) + 1));
          var hrest = gap;
          var vrest = gap;
          var P = [];
          var links = [];

          for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
              var x = x0 + c * hrest;
              var y = r * vrest;
              var band = Math.max(0, Math.min(BANDS - 1, Math.round((x / Math.max(1, W)) * (BANDS - 1))));
              P.push({ x: x, y: y, ox: x, oy: y, ax: 0, ay: 0, hx: x, hy: y, pin: r === 0, ch: charAtGrid(r, x), band: band });
            }
          }

          function add(a, b, rest, min, max) { links.push(a, b, rest * min, rest * max); }
          for (var rr = 0; rr < rows; rr++) {
            for (var cc = 0; cc < cols; cc++) {
              var id = rr * cols + cc;
              if (cc < cols - 1) add(id, id + 1, hrest, H_COMPRESS, H_STRETCH);
              if (rr < rows - 1) add(id, id + cols, vrest, COMPRESS, STRETCH);
            }
          }

          return { P: P, links: links, cols: cols, rows: rows, hrest: hrest, vrest: vrest, dir: dir, open: 0 };
        }

        function build() {
          W = window.innerWidth;
          H = window.innerHeight;
          dpr = Math.min(W < 640 ? 1 : 1.35, window.devicePixelRatio || 1);
          SP = W < 640 ? 12 : W < 980 ? 17 : 19;
          canvas.width = Math.max(1, Math.round(W * dpr));
          canvas.height = Math.max(1, Math.round(H * dpr));
          canvas.style.width = W + "px";
          canvas.style.height = H + "px";
          makeChars(Math.round(Math.max(W < 640 ? 10 : 13, SP * 0.95) * dpr));
          var seamPad = Math.max(2, SP * 0.28);
          curtains = [makeCurtain(0, W / 2 - seamPad, -1), makeCurtain(W / 2 + seamPad, W, 1)];

          var segs = 13;
          var cx = W - Math.min(40, W * 0.09);
          var sl = Math.min(H * 0.3, 250) / (segs - 1);
          cord = [];
          for (var i = 0; i < segs; i++) cord.push({ x: cx, y: i * sl, ox: cx, oy: i * sl, ax: 0, ay: 0, hx: cx, hy: i * sl, pin: i === 0, len: sl, cord: true });
          handle = cord[cord.length - 1];
          acc = 0;
          lastT = performance.now();
        }

        function resetPoint(p) {
          p.x = p.hx;
          p.y = p.hy;
          p.ox = p.hx;
          p.oy = p.hy;
          p.ax = 0;
          p.ay = 0;
        }

        function verlet(points, gravity, dt) {
          for (var i = 0; i < points.length; i++) {
            var p = points[i];
            if (!Number.isFinite(p.x) || !Number.isFinite(p.y) || !Number.isFinite(p.ox) || !Number.isFinite(p.oy)) {
              resetPoint(p);
            }
            if (p.pin) { p.ax = 0; p.ay = 0; continue; }
            var baseDamp = p.cord ? DAMP_CORD : ptr.active ? DAMP_ACTIVE : DAMP_IDLE;
            var damp = Math.pow(baseDamp, dt);
            var vx = (p.x - p.ox) * damp;
            var vy = (p.y - p.oy) * damp;
            p.ox = p.x;
            p.oy = p.y;
            p.ay += gravity;
            p.x += vx + p.ax * dt * dt;
            p.y += vy + p.ay * dt * dt;
            p.ax = 0;
            p.ay = 0;
          }
        }

        function link(p1, p2, minLength, maxLength, stiffness, absorption) {
          var dx = p2.x - p1.x;
          var dy = p2.y - p1.y;
          var d = Math.hypot(dx, dy) || 0.001;
          var targetLength = 0;
          if (d < minLength) targetLength = minLength;
          else if (d > maxLength) targetLength = maxLength;
          else return;
          var diff = targetLength - d;
          var share = p1.pin || p2.pin ? 1 : 0.5;
          var percent = diff / d * share * stiffness;
          var ox = dx * percent;
          var oy = dy * percent;
          if (!p1.pin) {
            p1.x -= ox;
            p1.y -= oy;
            p1.ox -= ox * absorption;
            p1.oy -= oy * absorption;
          }
          if (!p2.pin) {
            p2.x += ox;
            p2.y += oy;
            p2.ox += ox * absorption;
            p2.oy += oy * absorption;
          }
        }

        function solveCurtain(cur) {
          var P = cur.P;
          var links = cur.links;
          for (var i = 0; i < links.length; i += 4) {
            link(P[links[i]], P[links[i + 1]], links[i + 2], links[i + 3], 0.24, 0.93);
          }
        }
        function solveCord() {
          for (var i = 0; i < cord.length - 1; i++) {
            link(cord[i], cord[i + 1], cord[i].len, cord[i].len, 0.88, 0.7);
          }
        }

        function stabilize(points, dt, returnHome) {
          var maxDisplacement = Math.max(180, Math.min(W, H) * 0.48);
          for (var i = 0; i < points.length; i++) {
            var p = points[i];
            if (!Number.isFinite(p.x) || !Number.isFinite(p.y) || !Number.isFinite(p.ox) || !Number.isFinite(p.oy)) {
              resetPoint(p);
              continue;
            }
            if (!returnHome || p === ptr.particle || p === ptr.cordParticle) continue;
            if (p.pin) {
              resetPoint(p);
              continue;
            }

            var dx = p.hx - p.x;
            var dy = p.hy - p.y;
            var distance = Math.hypot(dx, dy);
            if (distance > maxDisplacement) {
              var clampScale = maxDisplacement / distance;
              p.x = p.hx - dx * clampScale;
              p.y = p.hy - dy * clampScale;
              p.ox = p.x;
              p.oy = p.y;
              dx = p.hx - p.x;
              dy = p.hy - p.y;
              distance = maxDisplacement;
            }

            var nearPointer = ptr.active && Math.hypot(ptr.x - p.x, ptr.y - p.y) < (W < 640 ? 120 : 158);
            var returnRate = p.cord ? 0.075 : nearPointer ? HOME_RETURN_ACTIVE : HOME_RETURN_IDLE;
            var homeBlend = 1 - Math.pow(1 - returnRate, dt);
            var correctionX = dx * homeBlend;
            var correctionY = dy * homeBlend;
            p.x += correctionX;
            p.y += correctionY;
            p.ox += correctionX;
            p.oy += correctionY;

            var speed = Math.hypot(p.x - p.ox, p.y - p.oy);
            if (!ptr.active && distance < HOME_SNAP_DISTANCE && speed < HOME_SNAP_SPEED) resetPoint(p);
          }
        }

        function pointToSegmentDistanceSq(x, y, a, b) {
          var dx = b.x - a.x;
          var dy = b.y - a.y;
          var len2 = dx * dx + dy * dy || 1;
          var t = Math.max(0, Math.min(1, ((x - a.x) * dx + (y - a.y) * dy) / len2));
          var px = a.x + dx * t;
          var py = a.y + dy * t;
          var ddx = x - px;
          var ddy = y - py;
          return ddx * ddx + ddy * ddy;
        }

        function findCordParticle(x, y) {
          if (!cord.length) return null;
          var radius = W < 640 ? 34 : 26;
          var radius2 = radius * radius;
          var best = null;
          var bestD2 = radius2;

          for (var i = 0; i < cord.length; i++) {
            var p = cord[i];
            var dx = p.x - x;
            var dy = p.y - y;
            var d2 = dx * dx + dy * dy;
            if (d2 < bestD2) {
              bestD2 = d2;
              best = p;
            }
          }

          for (var j = 0; j < cord.length - 1; j++) {
            var segD2 = pointToSegmentDistanceSq(x, y, cord[j], cord[j + 1]);
            if (segD2 < bestD2) {
              bestD2 = segD2;
              best = cord[j + 1];
            }
          }

          return best;
        }

        function smoothstep(edge0, edge1, x) {
          var t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
          return t * t * (3 - 2 * t);
        }
        function repel() {
          if (!ptr.active || ptr.x < -1000) return;
          var radius = W < 640 ? 108 : 142;
          var radius2 = radius * radius;
          var speed = Math.min(22, Math.hypot(ptr.vx, ptr.vy));
          for (var k = 0; k < curtains.length; k++) {
            var P = curtains[k].P;
            for (var i = 0; i < P.length; i++) {
              var p = P[i];
              if (p.pin) continue;
              var dx = ptr.x - p.x;
              var dy = ptr.y - p.y;
              var ls = dx * dx + dy * dy;
              if (ls < radius2 && ls > 1) {
                var falloff = smoothstep(radius2, 0, ls);
                var strength = falloff * MOUSE_STRENGTH * (0.14 + speed * 0.045);
                if (ptr.cordGrab || ptr.particle) strength *= 1.45;
                var inverseDistance = strength / Math.sqrt(ls);
                p.ax -= dx * inverseDistance;
                p.ay -= dy * inverseDistance;
                p.ax += ptr.vx * falloff * 0.018;
                p.ay += ptr.vy * falloff * 0.018;
              }
            }
          }
        }

        function findParticle(x, y) {
          var best = null;
          var bestD2 = 28 * 28;
          for (var k = 0; k < curtains.length; k++) {
            var P = curtains[k].P;
            for (var i = 0; i < P.length; i++) {
              var p = P[i];
              var dx = p.x - x;
              var dy = p.y - y;
              var d2 = dx * dx + dy * dy;
              if (d2 < bestD2) {
                bestD2 = d2;
                best = p;
              }
            }
          }
          return best;
        }

        function cordPullThreshold() {
          return Math.min(78, H * 0.1);
        }

        function armCordIfPulled() {
          if (!ptr.cordGrab || ptr.cordWaitingReturn) return;
          ptr.cordPeakY = Math.max(ptr.cordPeakY, ptr.y);
          if (ptr.y > ptr.cordStartY + cordPullThreshold()) ptr.cordArmed = true;
        }

        function openWhenCordReturns() {
          if (opening || !ptr.cordWaitingReturn || ptr.cordGrab) return;
          var watch = ptr.cordReturnParticle || handle;
          if (!watch) return;
          var returnedEnough = watch.y < ptr.cordReleaseY - (W < 640 ? 4 : 6);
          if (returnedEnough) {
            ptr.cordWaitingReturn = false;
            ptr.cordReturnParticle = null;
            open();
          }
        }

        function step(dt) {
          for (var k = 0; k < curtains.length; k++) verlet(curtains[k].P, GRAV, dt);
          verlet(cord, GRAV * 1.08, dt);

          if (ptr.cordGrab && ptr.cordParticle) {
            var vx = ptr.x - ptr.cordParticle.x;
            var vy = ptr.y - ptr.cordParticle.y;
            ptr.cordParticle.x = ptr.x;
            ptr.cordParticle.y = Math.max(0, ptr.y);
            ptr.cordParticle.ox = ptr.cordParticle.x - vx * 0.45;
            ptr.cordParticle.oy = ptr.cordParticle.y - vy * 0.45;
          }
          if (ptr.particle) {
            ptr.particle.x = ptr.x;
            ptr.particle.y = ptr.y;
            ptr.particle.ox = ptr.x;
            ptr.particle.oy = ptr.y;
          }

          repel();
          var pointerDecay = Math.pow(0.68, dt);
          ptr.vx *= pointerDecay;
          ptr.vy *= pointerDecay;
          if (Math.abs(ptr.vx) < 0.01) ptr.vx = 0;
          if (Math.abs(ptr.vy) < 0.01) ptr.vy = 0;

          if (opening) {
            for (var j = 0; j < curtains.length; j++) {
              var cur = curtains[j];
              cur.open = Math.min(1, cur.open + 0.026 * dt);
              var e = easeOutCubic(cur.open);
              for (var c = 0; c < cur.cols; c++) {
                var p = cur.P[c];
                var u = c / Math.max(1, cur.cols - 1);
                var edgePull = 0.68 + Math.abs(u - 0.5) * 0.32;
                p.x = p.hx + cur.dir * e * (W * 0.72) * edgePull;
                p.y = p.hy + Math.sin(u * Math.PI) * e * 26;
                p.ox = p.x;
                p.oy = p.y;
              }
            }
          }

          for (var it = 0; it < ITERS; it++) {
            for (var n = 0; n < curtains.length; n++) solveCurtain(curtains[n]);
            solveCord();
          }

          for (var s = 0; s < curtains.length; s++) stabilize(curtains[s].P, dt, !opening);
          stabilize(cord, dt, true);

          armCordIfPulled();
          openWhenCordReturns();
        }

        function open() {
          if (opening) return;
          opening = true;
          openT = performance.now();
          host.style.background = "transparent";
          revealSite();
        }

        function revealSite() {
          if (siteRevealed) return;
          siteRevealed = true;
          document.body.classList.remove("ci-site-hidden");
          window.dispatchEvent(new CustomEvent("amv:intro-complete"));
        }

        function drawCurtain(cur) {
          var P = cur.P;
          var rows = cur.rows;
          var cols = cur.cols;
          for (var r2 = 0; r2 < rows; r2++) {
            for (var c2 = 0; c2 < cols; c2++) {
              var pointIndex = r2 * cols + c2;
              var pp = P[pointIndex];
              var glyph = bandImg[pp.band] && bandImg[pp.band][pp.ch];
              if (!glyph || !glyphAtlas) continue;
              var co = 1, si = 0;
              if (r2 < rows - 1) {
                var down = P[pointIndex + cols];
                var dirX = down.x - pp.x;
                var dirY = down.y - pp.y;
                var directionLength2 = dirX * dirX + dirY * dirY;
                if (directionLength2 > 0.000001) {
                  var inverseDirectionLength = 1 / Math.sqrt(directionLength2);
                  co = dirY * inverseDirectionLength;
                  si = -dirX * inverseDirectionLength;
                } else {
                  co = 0;
                  si = -1;
                }
              }
              ctx.setTransform(co, si, -si, co, pp.x * dpr, pp.y * dpr);
              ctx.drawImage(
                glyphAtlas,
                glyph.x,
                glyph.y,
                glyphSize,
                glyphSize,
                -glyphSize / 2,
                -glyphSize / 2,
                glyphSize,
                glyphSize
              );
            }
          }
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function draw() {
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          for (var k = 0; k < curtains.length; k++) drawCurtain(curtains[k]);
          if (!handle) return;

          ctx.save();
          ctx.shadowColor = "rgba(34, 211, 238, 0.55)";
          ctx.shadowBlur = 14;
          ctx.beginPath();
          ctx.moveTo(cord[0].x, cord[0].y);
          for (var i = 1; i < cord.length; i++) ctx.lineTo(cord[i].x, cord[i].y);
          ctx.strokeStyle = "rgba(245, 247, 255, 0.98)";
          ctx.lineWidth = W < 640 ? 5 : 4;
          ctx.lineJoin = "round";
          ctx.lineCap = "round";
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(handle.x, handle.y, W < 640 ? 18 : 15, 0, Math.PI * 2);
          ctx.fillStyle = handleColor;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(handle.x, handle.y, W < 640 ? 8 : 7, 0, Math.PI * 2);
          ctx.fillStyle = "#0a0f1c";
          ctx.fill();
          ctx.restore();

          if (!opening && !ptr.cordGrab) {
            ctx.globalAlpha = 0.45 + 0.45 * Math.sin(performance.now() / 380);
            ctx.font = "700 14px 'Plus Jakarta Sans', sans-serif";
            ctx.fillStyle = "#f5f7ff";
            ctx.textAlign = "center";
            ctx.fillText("puxe v", handle.x, handle.y + 34);
            ctx.globalAlpha = 1;
          }
        }

        function deactivatePointer() {
          ptr.active = false;
          ptr.x = -9999;
          ptr.y = -9999;
          ptr.vx = 0;
          ptr.vy = 0;
        }

        function onMove(e) {
          if (ptr.pointerId !== null && typeof e.pointerId === "number" && e.pointerId !== ptr.pointerId) return;
          if (ptr.x > -1000) {
            ptr.vx = Math.max(-28, Math.min(28, e.clientX - ptr.x));
            ptr.vy = Math.max(-28, Math.min(28, e.clientY - ptr.y));
          }
          ptr.x = e.clientX;
          ptr.y = e.clientY;
          ptr.active = true;
          armCordIfPulled();
        }
        function onUp(e) {
          if (ptr.pointerId !== null && e && typeof e.pointerId === "number" && e.pointerId !== ptr.pointerId) return;
          var shouldOpenOnReturn = ptr.cordGrab && ptr.cordArmed;
          var returnParticle = ptr.cordParticle || handle;
          var releaseY = ptr.cordPeakY || ptr.y;
          ptr.cordGrab = false;
          if (ptr.cordParticle) {
            ptr.cordParticle.pin = ptr.cordParticleWasPinned;
            ptr.cordParticle = null;
          }
          if (shouldOpenOnReturn) {
            ptr.cordWaitingReturn = true;
            ptr.cordReturnParticle = returnParticle;
            ptr.cordReleaseY = releaseY;
            ptr.cordReturnStartedAt = performance.now();
          }
          ptr.cordArmed = false;
          ptr.cordPeakY = 0;
          if (ptr.particle) {
            if (ptr.particleWasPinned) {
              ptr.particle.x = ptr.particle.hx;
              ptr.particle.y = ptr.particle.hy;
              ptr.particle.ox = ptr.particle.hx;
              ptr.particle.oy = ptr.particle.hy;
            }
            ptr.particle.pin = ptr.particleWasPinned;
            ptr.particle = null;
          }
          ptr.pointerId = null;
          ptr.cordParticleWasPinned = false;
          ptr.particleWasPinned = false;
          if (ptr.pointerType !== "mouse") deactivatePointer();
        }
        function cancelInteraction() {
          ptr.cordArmed = false;
          ptr.cordWaitingReturn = false;
          ptr.cordReturnParticle = null;
          onUp();
          deactivatePointer();
        }
        function onLeave() {
          onUp();
          deactivatePointer();
        }
        function onResize() {
          cancelInteraction();
          clearTimeout(resizeTimer);
          resizeTimer = window.setTimeout(function () { if (!opening) build(); }, 180);
        }
        function revealIntroWhenReady() {
          if (!bootMinElapsed || !visualsReady || !host || finished) return;
          host.classList.remove("ci-boot");
          startLoop();
        }
        function onVisualsReady() {
          visualsReady = true;
          revealIntroWhenReady();
        }
        function startLoop() {
          if (finished || raf || document.hidden) return;
          acc = 0;
          lastT = performance.now();
          raf = requestAnimationFrame(loop);
        }
        function onVisibility() {
          if (document.hidden) {
            cancelInteraction();
            if (raf) cancelAnimationFrame(raf);
            raf = 0;
            return;
          }
          startLoop();
        }

        host.addEventListener("pointerdown", function (e) {
          ptr.pointerId = e.pointerId;
          ptr.pointerType = e.pointerType || "mouse";
          onMove(e);
          ptr.cordParticle = findCordParticle(ptr.x, ptr.y);
          if (ptr.cordParticle) {
            ptr.cordGrab = true;
            ptr.cordParticleWasPinned = ptr.cordParticle.pin;
            ptr.cordStartY = ptr.y;
            ptr.cordArmed = false;
            ptr.cordPeakY = ptr.y;
            ptr.cordWaitingReturn = false;
            ptr.cordReturnParticle = null;
            ptr.cordParticle.pin = true;
            ptr.cordParticle.x = ptr.x;
            ptr.cordParticle.y = ptr.y;
            ptr.cordParticle.ox = ptr.x;
            ptr.cordParticle.oy = ptr.y;
            if (host.setPointerCapture) host.setPointerCapture(e.pointerId);
            return;
          }

          ptr.particle = findParticle(ptr.x, ptr.y);
          if (ptr.particle) {
            ptr.particleWasPinned = ptr.particle.pin;
            ptr.particle.pin = true;
            ptr.particle.x = ptr.x;
            ptr.particle.y = ptr.y;
            ptr.particle.ox = ptr.x;
            ptr.particle.oy = ptr.y;
            if (host.setPointerCapture) host.setPointerCapture(e.pointerId);
          }
        });
        host.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
          }
        });
        window.addEventListener("pointermove", onMove, { passive: true });
        window.addEventListener("pointerup", onUp);
        window.addEventListener("pointercancel", onUp);
        host.addEventListener("lostpointercapture", onUp);
        host.addEventListener("pointerleave", onLeave);
        window.addEventListener("resize", onResize, { passive: true });
        window.addEventListener("blur", cancelInteraction);
        window.addEventListener("visibilitychange", onVisibility);
        window.addEventListener("amv:visuals-ready", onVisualsReady, { once: true });

        function loop(now) {
          raf = 0;
          if (finished || document.hidden) return;
          var elapsed = Math.min(50, now - lastT);
          lastT = now;
          acc += elapsed;
          var steps = 0;
          while (acc >= STEP_MS && steps < MAX_STEPS) {
            step(1);
            acc -= STEP_MS;
            steps++;
          }
          if (steps === 0) step(Math.max(0.5, elapsed / STEP_MS));
          else if (acc >= STEP_MS) acc = 0;
          draw();
          if (opening && performance.now() - openT > 1200) {
            finishNow();
            return;
          }
          raf = requestAnimationFrame(loop);
        }

        // toca a intro só uma vez por sessão da aba (ex.: não repete ao voltar
        // do dashboard / recarregar do cache) — só revela o site direto
        try {
          if (sessionStorage.getItem("amv_intro_seen")) {
            revealSite();
            finishNow();
            return true;
          }
          sessionStorage.setItem("amv_intro_seen", "1");
        } catch (e) {}

        build();
        draw();
        bootMinTimer = window.setTimeout(function () {
          bootMinElapsed = true;
          revealIntroWhenReady();
        }, 160);
        bootFallbackTimer = window.setTimeout(function () {
          bootMinElapsed = true;
          visualsReady = true;
          revealIntroWhenReady();
        }, 1800);
        return true;
      };
      window.__amvClothIntro();
    </script>
    <a class="skip-link" href="#conteudo">Pular para o conteúdo</a>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
