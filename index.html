    <!-- Tela de abertura (preloader): CSS inline para aparecer instantâneo,
         antes do bundle carregar. É escondida pelo main.ts quando o site fica pronto. -->
    <style>
      /* Abertura estilo Lusion adaptada ao "A":
         a barra carrega (contador 0→100) → a barra vira uma JANELA em forma
         de A que mostra o site por dentro (entorno vazio) → a janela cresce e
         o entorno some, revelando o site. Tema-aware. */
      #preloader { position: fixed; inset: 0; z-index: 9999; }
      #preloader svg { position: absolute; inset: 0; width: 100%; height: 100%; }
      #preloader .pl-cover { fill: #070a12; }
      :root[data-theme="light"] #preloader .pl-cover { fill: #eef1f8; }
      /* barra de carregamento (é o que se transforma na janela do A) */
      #preloader .pl-bar {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: 104px; height: 30px; border-radius: 4px;
        background: rgba(138, 147, 168, 0.22); overflow: hidden;
      }
      #preloader .pl-bar i { display: block; height: 100%; width: 0%; background: #f5f7ff; }
      :root[data-theme="light"] #preloader .pl-bar i { background: #0b1020; }
      /* contador gigante no canto inferior esquerdo (assinatura Lusion) */
      #preloader .pl-count {
        position: absolute; left: 6vw; bottom: 6vh;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif; font-weight: 800;
        font-size: clamp(3.5rem, 11vw, 8rem); line-height: 0.8;
        color: #f5f7ff; font-variant-numeric: tabular-nums;
      }
      :root[data-theme="light"] #preloader .pl-count { color: #0b1020; }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#conteudo">Pular para o conteúdo</a>
    <div id="preloader" role="status" aria-label="Carregando">
      <svg viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
        <defs>
          <mask id="plMask" maskUnits="userSpaceOnUse">
            <rect x="-3000" y="-3000" width="7280" height="6720" fill="#fff" />
            <g id="plHole"><path id="plA" fill="#000" /></g>
          </mask>
        </defs>
        <rect class="pl-cover" x="-3000" y="-3000" width="7280" height="6720" mask="url(#plMask)" />
      </svg>
      <div class="pl-bar" id="plBar"><i id="plFill"></i></div>
      <div class="pl-count" id="plCount">0</div>
    </div>
    <script>
      // Abertura: contador 0→100 + barra → a barra vira uma JANELA em forma de A
      // (site aparece só dentro do A) → a janela cresce e o entorno some.
      (function () {
        var pre = document.getElementById("preloader");
        var count = document.getElementById("plCount");
        var fill = document.getElementById("plFill");
        var bar = document.getElementById("plBar");
        var hole = document.getElementById("plHole");
        var cover = document.querySelector("#preloader .pl-cover");
        var plA = document.getElementById("plA");
        if (!pre || !hole || !plA) return;

        if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          pre.remove();
          return;
        }

        function CB(x1, y1, x2, y2) {
          function A(a, b) { return 1 - 3 * b + 3 * a; } function B(a, b) { return 3 * b - 6 * a; } function C(a) { return 3 * a; }
          function ca(t, a, b) { return ((A(a, b) * t + B(a, b)) * t + C(a)) * t; }
          function sl(t, a, b) { return 3 * A(a, b) * t * t + 2 * B(a, b) * t + C(a); }
          return function (x) { if (x <= 0) return 0; if (x >= 1) return 1; var t = x; for (var i = 0; i < 8; i++) { var e = ca(t, x1, x2) - x; if (Math.abs(e) < 1e-4) break; var d = sl(t, x1, x2); if (Math.abs(d) < 1e-6) break; t -= e / d; } return ca(t, y1, y2); };
        }
        var eS = CB(0.7, 0, 0.3, 1), eO = CB(0.25, 0.1, 0.25, 1), cl = function (v) { return Math.max(0, Math.min(1, v)); };

        // gera a silhueta do A (2 pernas + travessão) com espessura sw variável
        var G = { cx: 640, apexY: 250, footY: 470, fh: 104, cbY: 402 };
        function setA(sw) {
          var ap = [G.cx, G.apexY], lf = [G.cx - G.fh, G.footY], rf = [G.cx + G.fh, G.footY], cbH = Math.max(32, sw * 0.9);
          function q(p, r, w) { var dx = r[0] - p[0], dy = r[1] - p[1], L = Math.hypot(dx, dy), nx = -dy / L * w / 2, ny = dx / L * w / 2; return [[p[0] + nx, p[1] + ny], [r[0] + nx, r[1] + ny], [r[0] - nx, r[1] - ny], [p[0] - nx, p[1] - ny]]; }
          function d(P) { return "M" + P.map(function (p) { return p[0].toFixed(1) + " " + p[1].toFixed(1); }).join("L") + "Z"; }
          var t = (G.cbY - G.apexY) / (G.footY - G.apexY), lx = ap[0] + (lf[0] - ap[0]) * t, rx = ap[0] + (rf[0] - ap[0]) * t;
          var cb = [[lx, G.cbY - cbH / 2], [rx, G.cbY - cbH / 2], [rx, G.cbY + cbH / 2], [lx, G.cbY + cbH / 2]];
          plA.setAttribute("d", d(q(ap, lf, sw)) + " " + d(q(ap, rf, sw)) + " " + d(cb));
        }
        setA(36);

        var DUR = 1500, FORM = 1500, REVEAL = 2350, END = 3450;
        var start = performance.now();
        (function loop(now) {
          var T = now - start;
          var v = T < DUR ? Math.round((1 - Math.pow(1 - T / DUR, 2)) * 100) : 100;
          count.textContent = v; if (fill) fill.style.width = v + "%";
          var holeS = 0;
          if (T >= FORM && T < REVEAL) {
            // a janela do A floresce a partir da barra (traços finos)
            holeS = 0.14 + 0.86 * eS(cl((T - FORM) / 650));
            if (bar) bar.style.opacity = 1 - cl((T - FORM) / 300);
          } else if (T >= REVEAL) {
            // REVELAÇÃO: os TRAÇOS do A engrossam e crescem até o site preencher
            if (bar) bar.style.opacity = 0;
            var p = eS(cl((T - REVEAL) / 950));
            setA(36 + 900 * p);
            holeS = 1 + 3.2 * p;
            count.style.opacity = 1 - eO(cl((T - REVEAL) / 300));
          }
          hole.setAttribute("transform", "translate(640 402) scale(" + holeS + ") translate(-640 -402)");
          if (T < END) { requestAnimationFrame(loop); } else if (pre.parentNode) { pre.remove(); }
        })(start);
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
