    <!-- Tela de abertura (preloader): CSS inline para aparecer instantâneo,
         antes do bundle carregar. É escondida pelo main.ts quando o site fica pronto. -->
    <style>
      /* Abertura estilo Lusion adaptada ao "A":
         barra de carregamento enche → contador chega a 100 → a barra vira o
         "A" → o A cresce e revela o site. Tema-aware. */
      @property --pl-hole {
        syntax: "<percentage>";
        inherits: false;
        initial-value: 0%;
      }
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #070a12;
        --pl-hole: 0%;
        /* abertura circular que cresce a partir do centro (onde está o A) */
        -webkit-mask: radial-gradient(circle farthest-corner at 50% 50%, transparent var(--pl-hole), #000 calc(var(--pl-hole) + 0.4%));
        mask: radial-gradient(circle farthest-corner at 50% 50%, transparent var(--pl-hole), #000 calc(var(--pl-hole) + 0.4%));
        transition: --pl-hole 1s cubic-bezier(0.76, 0, 0.24, 1), opacity 0.5s ease 0.45s;
      }
      :root[data-theme="light"] #preloader { background: #eef1f8; }

      /* cor dos traços (tema-aware) */
      #preloader .pl-bar,
      #preloader .pl-load i { background: #f5f7ff; }
      :root[data-theme="light"] #preloader .pl-bar,
      :root[data-theme="light"] #preloader .pl-load i { background: #0b1020; }

      /* palco central: barra e A sobrepostos */
      #preloader .pl-stage {
        position: relative;
        width: 168px;
        height: 184px;
        display: grid;
        place-items: center;
        transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
      }

      /* FASE 1 — barra de carregamento (branca enchendo sobre cinza) */
      #preloader .pl-load {
        position: absolute;
        width: min(320px, 70vw);
        height: 18px;
        border-radius: 3px;
        background: rgba(138, 147, 168, 0.22);
        overflow: hidden;
        transition: opacity 0.2s ease;
      }
      #preloader .pl-load i { display: block; height: 100%; width: 0%; }

      /* FASE 2 — o "A" (escondido até a barra encher) — traços grossos e sólidos */
      #preloader .pl-a {
        position: absolute;
        width: 168px;
        height: 184px;
        opacity: 0;
      }
      #preloader .pl-bar { position: absolute; border-radius: 4px; }
      #preloader .pl-leg {
        bottom: 0;
        width: 18px;
        height: 196px;
        transform-origin: bottom center;
      }
      /* começam quase deitadas (como a barra) e curtas */
      #preloader .pl-leg--l { left: 6px; transform: rotate(74deg) scaleY(0.18); }
      #preloader .pl-leg--r { left: 144px; transform: rotate(-74deg) scaleY(0.18); }
      #preloader .pl-cross {
        left: 47px; top: 116px; width: 74px; height: 18px;
        transform-origin: center; transform: scaleX(0);
      }

      /* barra enche → vira o A (classe via JS) */
      #preloader.is-forming .pl-load { opacity: 0; }
      #preloader.is-forming .pl-a { opacity: 1; }
      #preloader.is-forming .pl-leg--l { animation: pl-legL 0.6s cubic-bezier(0.76, 0, 0.24, 1) forwards; }
      #preloader.is-forming .pl-leg--r { animation: pl-legR 0.6s cubic-bezier(0.76, 0, 0.24, 1) forwards; }
      #preloader.is-forming .pl-cross { animation: pl-crossIn 0.5s 0.22s cubic-bezier(0.76, 0, 0.24, 1) forwards; }
      @keyframes pl-legL { to { transform: rotate(21deg) scaleY(1); } }
      @keyframes pl-legR { to { transform: rotate(-21deg) scaleY(1); } }
      @keyframes pl-crossIn { to { transform: scaleX(1); } }

      /* contador gigante no canto inferior esquerdo (assinatura Lusion) */
      #preloader .pl-count {
        position: absolute;
        left: 6vw;
        bottom: 6vh;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        font-weight: 800;
        font-size: clamp(3.5rem, 11vw, 8rem);
        line-height: 0.8;
        color: #f5f7ff;
        font-variant-numeric: tabular-nums;
        transition: opacity 0.3s ease;
      }
      :root[data-theme="light"] #preloader .pl-count { color: #0b1020; }

      /* REVELAÇÃO — a abertura cresce a partir do A e revela o site;
         o A dá um "burst" (cresce um pouco) e some junto. */
      #preloader.is-hidden { --pl-hole: 100%; opacity: 0; pointer-events: none; }
      #preloader.is-hidden .pl-stage {
        transform: scale(5);
        opacity: 0;
        transition: transform 1.1s cubic-bezier(0.76, 0, 0.24, 1), opacity 0.6s ease 0.1s;
      }
      #preloader.is-hidden .pl-count { opacity: 0; }

      @media (prefers-reduced-motion: reduce) {
        #preloader .pl-load { display: none; }
        #preloader .pl-a { opacity: 1; }
        #preloader .pl-leg--l { transform: rotate(21deg) scaleY(1); }
        #preloader .pl-leg--r { transform: rotate(-21deg) scaleY(1); }
        #preloader .pl-cross { transform: scaleX(1); }
        #preloader.is-hidden .pl-stage { transform: none; }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#conteudo">Pular para o conteúdo</a>
    <div id="preloader" role="status" aria-label="Carregando">
      <div class="pl-stage" aria-hidden="true">
        <div class="pl-load"><i id="pl-fill"></i></div>
        <div class="pl-a">
          <span class="pl-bar pl-leg pl-leg--l"></span>
          <span class="pl-bar pl-leg pl-leg--r"></span>
          <span class="pl-bar pl-cross"></span>
        </div>
      </div>
      <div class="pl-count"><i id="pl-count">0</i></div>
    </div>
    <script>
      // Sequência da abertura (roda já, antes do bundle):
      // barra enche + contador 0→100 → vira o "A" → cresce e revela o site.
      (function () {
        var pre = document.getElementById("preloader");
        var num = document.getElementById("pl-count");
        var fill = document.getElementById("pl-fill");
        if (!pre || !num) return;
        var start = performance.now();
        var dur = 1500;
        (function tick(now) {
          var p = Math.min(1, (now - start) / dur);
          var v = Math.round((1 - Math.pow(1 - p, 2)) * 100); // ease-out
          num.textContent = v;
          if (fill) fill.style.width = v + "%";
          if (p < 1) {
            requestAnimationFrame(tick);
          } else {
            pre.classList.add("is-forming"); // a barra vira o A
            setTimeout(function () { pre.classList.add("is-hidden"); }, 950); // abertura revela o site
            setTimeout(function () { if (pre.parentNode) pre.remove(); }, 2150);
          }
        })(start);
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
