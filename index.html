<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070A12" />

    <!-- aplica o tema salvo antes de renderizar (evita flash) -->
    <script>
      try {
        var t = localStorage.getItem("theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>

    <!-- RNF07 — SEO básico -->
    <title>AMV Web Studio | Sites profissionais para negócios locais</title>
    <meta
      name="description"
      content="Criação de sites, landing pages e páginas profissionais para negócios locais com WhatsApp, serviços, localização, formulário e visual responsivo."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AMV Web Studio | Sites profissionais para negócios locais" />
    <meta
      property="og:description"
      content="Sites rápidos, bonitos e responsivos para negócios locais venderem mais e passarem confiança."
    />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="AMV Web Studio" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Dados estruturados: ajuda o Google a entender que é um negócio real -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "AMV Web Studio",
        "description": "Criação de sites, landing pages e páginas profissionais para negócios locais.",
        "areaServed": "BR",
        "priceRange": "$$",
        "serviceType": "Criação de sites",
        "sameAs": ["https://instagram.com/amvwebstudio"],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "email": "contato@amvwebstudio.com.br",
          "availableLanguage": "Portuguese"
        }
      }
    </script>

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23070A12'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%2300FF88'/%3E%3C/svg%3E" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Tela de abertura (preloader): CSS inline para aparecer instantâneo,
         antes do bundle carregar. É escondida pelo main.ts quando o site fica pronto. -->
    <style>
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #070a12;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      :root[data-theme="light"] #preloader {
        background: #eef1f8;
      }
      #preloader.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #preloader .pl-ring {
        width: 62px;
        height: 62px;
        border-radius: 50%;
        background: conic-gradient(from 0deg, #a855f7, #22d3ee, #00ff88, #a855f7);
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 0);
        mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 0);
        animation: pl-spin 0.9s linear infinite;
      }
      #preloader .pl-word {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        font-weight: 800;
        letter-spacing: 0.14em;
        font-size: 0.82rem;
        text-transform: uppercase;
        background: linear-gradient(90deg, #a855f7, #22d3ee, #00ff88);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      @keyframes pl-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #preloader .pl-ring {
          animation-duration: 2s;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#conteudo">Pular para o conteúdo</a>
    <div id="preloader" role="status" aria-label="Carregando">
      <div class="pl-ring" aria-hidden="true"></div>
      <div class="pl-word">AMV Web Studio</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
