  <body class="ci-lock ci-site-hidden is-intro-pending">
    <div id="clothintro" role="button" tabindex="0" aria-label="Puxe a corda para entrar">
      <canvas id="ci-canvas"></canvas>
    </div>
    <script>
      window.__amvClothIntro = function () {
        var host = document.getElementById("clothintro");
        var canvas = document.getElementById("ci-canvas");
        var raf = 0;
        var resizeTimer = 0;
        var finished = false;

        function finishNow() {
          if (finished) return;
          finished = true;
          if (raf) cancelAnimationFrame(raf);
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
          window.removeEventListener("resize", onResize);
          if (host && host.parentNode) host.remove();
          document.body.classList.remove("ci-lock");
          revealSite();
        }

        if (!host || !canvas || !canvas.getContext) { finishNow(); return true; }
        if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) { finishNow(); return true; }

        var ctx = canvas.getContext("2d", { alpha: true });
        if (!ctx) { finishNow(); return true; }

        var CHARS = "AMV WEB STUDIO SITES QUE VENDEM </> {} () => #01 ";
        var BANDS = 5;
        var PUR = [168, 85, 247], CYA = [34, 211, 238], GRN = [0, 255, 136];
        var W = 0, H = 0, dpr = 1, SP = 26;
        var GRAV = 0.2, DAMP = 0.992, ITERS = 5;
        var COMPRESS = 0.02, STRETCH = 1.1, H_COMPRESS = 0.6, H_STRETCH = 4;
        var HOME_FORCE = 0.0028, HOME_DEADZONE = 10;
        var MOUSE_SIZE = 5000, MOUSE_STRENGTH = 4;
        var STEP_MS = 1000 / 60, MAX_STEPS = 2;
        var curtains = [], cord = [], handle = null, bandImg = [];
        var opening = false, openT = 0, started = performance.now(), lastT = started, acc = 0;
        var siteRevealed = false;
        var ptr = {
          x: -9999,
          y: -9999,
          cordGrab: false,
          cordParticle: null,
          cordParticleWasPinned: false,
          cordStartY: 0,
          cordArmed: false,
          cordPeakY: 0,
          cordReturnParticle: null,
          cordReleaseY: 0,
          cordReturnStartedAt: 0,
          cordWaitingReturn: false,
          particle: null,
          particleWasPinned: false
        };

        function mix(a, b, t) {
          return [
            a[0] + (b[0] - a[0]) * t,
            a[1] + (b[1] - a[1]) * t,
            a[2] + (b[2] - a[2]) * t
          ];
        }
        function grad(t) {
          var c = t < 0.5 ? mix(PUR, CYA, t * 2) : mix(CYA, GRN, (t - 0.5) * 2);
          return "rgb(" + (c[0] | 0) + "," + (c[1] | 0) + "," + (c[2] | 0) + ")";
        }
        function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

        function makeChars(fs) {
          bandImg = [];
          for (var bi = 0; bi < BANDS; bi++) {
            var col = grad(bi / (BANDS - 1));
            var map = {};
            var seen = {};
            for (var i = 0; i < CHARS.length; i++) {
              var ch = CHARS[i];
              if (ch === " " || seen[ch]) continue;
              seen[ch] = 1;
              var s = Math.ceil(fs * 1.72);
              var off = document.createElement("canvas");
              off.width = s;
              off.height = s;
              var o = off.getContext("2d");
              o.font = "bold " + fs + "px monospace";
              o.textAlign = "center";
              o.textBaseline = "middle";
              o.fillStyle = col;
              o.fillText(ch, s / 2, s / 2);
              map[ch] = off;
            }
            bandImg.push(map);
          }
        }

        function makeCurtain(x0, x1, dir) {
          var width = x1 - x0;
          var cols = Math.max(12, Math.min(50, Math.floor(width / 10)));
          var rows = Math.max(16, Math.min(50, Math.floor(W / 5)));
          var hrest = (x1 - x0) / (cols - 1);
          var vrest = H / (rows - 1);
          var P = [];
          var links = [];

          for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
              var x = x0 + c * hrest;
              var y = r * vrest;
              var band = Math.max(0, Math.min(BANDS - 1, Math.round((x / Math.max(1, W)) * (BANDS - 1))));
              P.push({ x: x, y: y, ox: x, oy: y, ax: 0, ay: 0, hx: x, hy: y, pin: r === 0, ch: CHARS[(r * cols + c) % CHARS.length], band: band });
            }
          }

          function add(a, b, rest, min, max) { links.push([a, b, rest * min, rest * max]); }
          for (var rr = 0; rr < rows; rr++) {
            for (var cc = 0; cc < cols; cc++) {
              var id = rr * cols + cc;
              if (cc < cols - 1) add(id, id + 1, hrest, H_COMPRESS, H_STRETCH);
              if (rr < rows - 1) add(id, id + cols, vrest, COMPRESS, STRETCH);
            }
          }

          return { P: P, links: links, cols: cols, rows: rows, hrest: hrest, vrest: vrest, dir: dir, open: 0 };
        }

        function build() {
          W = window.innerWidth;
          H = window.innerHeight;
          dpr = Math.min(W < 640 ? 1.25 : 1.5, window.devicePixelRatio || 1);
          SP = W < 640 ? 34 : W < 980 ? 30 : 26;
          canvas.width = Math.max(1, Math.round(W * dpr));
          canvas.height = Math.max(1, Math.round(H * dpr));
          canvas.style.width = W + "px";
          canvas.style.height = H + "px";
          makeChars(Math.round(Math.max(12, (H / (Math.max(16, Math.min(50, Math.floor(W / 5))) - 1)) * 1.2) * dpr));
          curtains = [makeCurtain(0, W / 2, -1), makeCurtain(W / 2, W, 1)];

          var segs = 13;
          var cx = W - Math.min(40, W * 0.09);
          var sl = Math.min(H * 0.3, 250) / (segs - 1);
          cord = [];
          for (var i = 0; i < segs; i++) cord.push({ x: cx, y: i * sl, ox: cx, oy: i * sl, ax: 0, ay: 0, hx: cx, hy: i * sl, pin: i === 0, len: sl, cord: true });
          handle = cord[cord.length - 1];
          acc = 0;
          lastT = performance.now();
        }

        function verlet(points, gravity, dt) {
          var damp = Math.pow(DAMP, dt);
          for (var i = 0; i < points.length; i++) {
            var p = points[i];
            if (p.pin) { p.ax = 0; p.ay = 0; continue; }
            var vx = (p.x - p.ox) * damp;
            var vy = (p.y - p.oy) * damp;
            p.ox = p.x;
            p.oy = p.y;
            p.ay += gravity;
            if (!opening && p !== ptr.particle && typeof p.hx === "number" && typeof p.hy === "number") {
              var homeDx = p.hx - p.x;
              var homeDy = p.hy - p.y;
              var homeD2 = homeDx * homeDx + homeDy * homeDy;
              var homeEase = Math.min(1, Math.max(0, (Math.sqrt(homeD2) - (p.cord ? 2 : HOME_DEADZONE)) / (p.cord ? 60 : 90)));
              homeEase = homeEase * homeEase * (3 - 2 * homeEase);
              var homeForce = p.cord ? 0.018 : HOME_FORCE;
              p.ax += homeDx * homeForce * homeEase;
              p.ay += homeDy * homeForce * homeEase;
            }
            p.x += vx + p.ax * dt * dt;
            p.y += vy + p.ay * dt * dt;
            p.ax = 0;
            p.ay = 0;
          }
        }

        function link(p1, p2, minLength, maxLength) {
          var dx = p2.x - p1.x;
          var dy = p2.y - p1.y;
          var d = Math.hypot(dx, dy) || 0.001;
          var targetLength = 0;
          if (d < minLength) targetLength = minLength;
          else if (d > maxLength) targetLength = maxLength;
          else return;
          var diff = targetLength - d;
          var percent = diff / d / 2;
          var ox = dx * percent;
          var oy = dy * percent;
          if (!p1.pin) { p1.x -= ox; p1.y -= oy; }
          if (!p2.pin) { p2.x += ox; p2.y += oy; }
        }

        function solveCurtain(cur) {
          var P = cur.P;
          var links = cur.links;
          for (var i = 0; i < links.length; i++) {
            var l = links[i];
            link(P[l[0]], P[l[1]], l[2], l[3]);
          }
        }
        function solveCord() {
          for (var i = 0; i < cord.length - 1; i++) link(cord[i], cord[i + 1], cord[i].len, cord[i].len);
        }

        function pointToSegmentDistanceSq(x, y, a, b) {
          var dx = b.x - a.x;
          var dy = b.y - a.y;
          var len2 = dx * dx + dy * dy || 1;
          var t = Math.max(0, Math.min(1, ((x - a.x) * dx + (y - a.y) * dy) / len2));
          var px = a.x + dx * t;
          var py = a.y + dy * t;
          var ddx = x - px;
          var ddy = y - py;
          return ddx * ddx + ddy * ddy;
        }

        function findCordParticle(x, y) {
          if (!cord.length) return null;
          var radius = W < 640 ? 34 : 26;
          var radius2 = radius * radius;
          var best = null;
          var bestD2 = radius2;

          for (var i = 0; i < cord.length; i++) {
            var p = cord[i];
            var dx = p.x - x;
            var dy = p.y - y;
            var d2 = dx * dx + dy * dy;
            if (d2 < bestD2) {
              bestD2 = d2;
              best = p;
            }
          }

          for (var j = 0; j < cord.length - 1; j++) {
            var segD2 = pointToSegmentDistanceSq(x, y, cord[j], cord[j + 1]);
            if (segD2 < bestD2) {
              bestD2 = segD2;
              best = cord[j + 1];
            }
          }

          return best;
        }

        function smoothstep(edge0, edge1, x) {
          var t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
          return t * t * (3 - 2 * t);
        }
        function repel() {
          if (ptr.x < -1000) return;
          for (var k = 0; k < curtains.length; k++) {
            var P = curtains[k].P;
            for (var i = 0; i < P.length; i++) {
              var p = P[i];
              if (p.pin) continue;
              var dx = ptr.x - p.x;
              var dy = ptr.y - p.y;
              var ls = dx * dx + dy * dy;
              if (ls < MOUSE_SIZE && ls > 1) {
                var a = Math.atan2(dy, dx) - Math.PI;
                var strength = smoothstep(MOUSE_SIZE, -2000, ls) * MOUSE_STRENGTH / 300;
                if (ptr.cordGrab || ptr.particle) strength *= 1.45;
                p.ax += Math.cos(a) * strength;
                p.ay += Math.sin(a) * strength;
              }
            }
          }
        }

        function findParticle(x, y) {
          var best = null;
          var bestD2 = 28 * 28;
          for (var k = 0; k < curtains.length; k++) {
            var P = curtains[k].P;
            for (var i = 0; i < P.length; i++) {
              var p = P[i];
              var dx = p.x - x;
              var dy = p.y - y;
              var d2 = dx * dx + dy * dy;
              if (d2 < bestD2) {
                bestD2 = d2;
                best = p;
              }
            }
          }
          return best;
        }

        function cordPullThreshold() {
          return Math.min(78, H * 0.1);
        }

        function armCordIfPulled() {
          if (!ptr.cordGrab || ptr.cordWaitingReturn) return;
          ptr.cordPeakY = Math.max(ptr.cordPeakY, ptr.y);
          if (ptr.y > ptr.cordStartY + cordPullThreshold()) ptr.cordArmed = true;
        }

        function openWhenCordReturns() {
          if (opening || !ptr.cordWaitingReturn || ptr.cordGrab) return;
          var watch = ptr.cordReturnParticle || handle;
          if (!watch) return;
          var returnedEnough = watch.y < ptr.cordReleaseY - (W < 640 ? 4 : 6);
          if (returnedEnough) {
            ptr.cordWaitingReturn = false;
            ptr.cordReturnParticle = null;
            open();
          }
        }

        function step(dt) {
          for (var k = 0; k < curtains.length; k++) verlet(curtains[k].P, GRAV, dt);
          verlet(cord, GRAV * 1.08, dt);

          if (ptr.cordGrab && ptr.cordParticle) {
            var vx = ptr.x - ptr.cordParticle.x;
            var vy = ptr.y - ptr.cordParticle.y;
            ptr.cordParticle.x = ptr.x;
            ptr.cordParticle.y = Math.max(0, ptr.y);
            ptr.cordParticle.ox = ptr.cordParticle.x - vx * 0.45;
            ptr.cordParticle.oy = ptr.cordParticle.y - vy * 0.45;
          }
          if (ptr.particle) {
            ptr.particle.x = ptr.x;
            ptr.particle.y = ptr.y;
            ptr.particle.ox = ptr.x;
            ptr.particle.oy = ptr.y;
          }

          repel();

          if (opening) {
            for (var j = 0; j < curtains.length; j++) {
              var cur = curtains[j];
              cur.open = Math.min(1, cur.open + 0.026 * dt);
              var e = easeOutCubic(cur.open);
              for (var c = 0; c < cur.cols; c++) {
                var p = cur.P[c];
                var u = c / Math.max(1, cur.cols - 1);
                var edgePull = 0.68 + Math.abs(u - 0.5) * 0.32;
                p.x = p.hx + cur.dir * e * (W * 0.72) * edgePull;
                p.y = p.hy + Math.sin(u * Math.PI) * e * 26;
                p.ox = p.x;
                p.oy = p.y;
              }
            }
          }

          for (var it = 0; it < ITERS; it++) {
            for (var n = 0; n < curtains.length; n++) solveCurtain(curtains[n]);
            solveCord();
          }

          armCordIfPulled();
          openWhenCordReturns();
        }

        function open() {
          if (opening) return;
          opening = true;
          openT = performance.now();
          host.style.background = "transparent";
          revealSite();
        }

        function revealSite() {
          if (siteRevealed) return;
          siteRevealed = true;
          document.body.classList.remove("ci-site-hidden");
          window.dispatchEvent(new CustomEvent("amv:intro-complete"));
        }

        function ix(cur, r, c) { return r * cur.cols + c; }

        function drawCurtain(cur) {
          var P = cur.P;
          var rows = cur.rows;
          var cols = cur.cols;
          for (var r2 = 0; r2 < rows; r2++) {
            for (var c2 = 0; c2 < cols; c2++) {
              var pp = P[ix(cur, r2, c2)];
              var img = bandImg[pp.band] && bandImg[pp.band][pp.ch];
              if (!img) continue;
              var ang = 0;
              if (r2 < rows - 1) {
                var down = P[ix(cur, r2 + 1, c2)];
                ang = Math.atan2(down.y - pp.y, down.x - pp.x) - Math.PI / 2;
              }
              var co = Math.cos(ang), si = Math.sin(ang);
              ctx.setTransform(co, si, -si, co, pp.x * dpr, pp.y * dpr);
              ctx.drawImage(img, -img.width / 2, -img.height / 2);
            }
          }
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function draw() {
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          for (var k = 0; k < curtains.length; k++) drawCurtain(curtains[k]);
          if (!handle) return;

          ctx.save();
          ctx.shadowColor = "rgba(34, 211, 238, 0.55)";
          ctx.shadowBlur = 14;
          ctx.beginPath();
          ctx.moveTo(cord[0].x, cord[0].y);
          for (var i = 1; i < cord.length; i++) ctx.lineTo(cord[i].x, cord[i].y);
          ctx.strokeStyle = "rgba(245, 247, 255, 0.98)";
          ctx.lineWidth = W < 640 ? 5 : 4;
          ctx.lineJoin = "round";
          ctx.lineCap = "round";
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(handle.x, handle.y, W < 640 ? 18 : 15, 0, Math.PI * 2);
          ctx.fillStyle = grad(0.5);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(handle.x, handle.y, W < 640 ? 8 : 7, 0, Math.PI * 2);
          ctx.fillStyle = "#0a0f1c";
          ctx.fill();
          ctx.restore();

          if (!opening && !ptr.cordGrab) {
            ctx.globalAlpha = 0.45 + 0.45 * Math.sin(performance.now() / 380);
            ctx.font = "700 14px 'Plus Jakarta Sans', sans-serif";
            ctx.fillStyle = "#f5f7ff";
            ctx.textAlign = "center";
            ctx.fillText("puxe v", handle.x, handle.y + 34);
            ctx.globalAlpha = 1;
          }
        }

        function onMove(e) {
          ptr.x = e.clientX;
          ptr.y = e.clientY;
          armCordIfPulled();
        }
        function onUp() {
          var shouldOpenOnReturn = ptr.cordGrab && ptr.cordArmed;
          var returnParticle = ptr.cordParticle || handle;
          var releaseY = ptr.cordPeakY || ptr.y;
          ptr.cordGrab = false;
          if (ptr.cordParticle) {
            ptr.cordParticle.pin = ptr.cordParticleWasPinned;
            ptr.cordParticle = null;
          }
          if (shouldOpenOnReturn) {
            ptr.cordWaitingReturn = true;
            ptr.cordReturnParticle = returnParticle;
            ptr.cordReleaseY = releaseY;
            ptr.cordReturnStartedAt = performance.now();
          }
          ptr.cordArmed = false;
          ptr.cordPeakY = 0;
          if (ptr.particle) {
            ptr.particle.pin = ptr.particleWasPinned;
            ptr.particle = null;
          }
        }
        function onResize() {
          clearTimeout(resizeTimer);
          resizeTimer = window.setTimeout(function () { if (!opening) build(); }, 180);
        }

        host.addEventListener("pointerdown", function (e) {
          onMove(e);
          ptr.cordParticle = findCordParticle(ptr.x, ptr.y);
          if (ptr.cordParticle) {
            ptr.cordGrab = true;
            ptr.cordParticleWasPinned = ptr.cordParticle.pin;
            ptr.cordStartY = ptr.y;
            ptr.cordArmed = false;
            ptr.cordPeakY = ptr.y;
            ptr.cordWaitingReturn = false;
            ptr.cordReturnParticle = null;
            ptr.cordParticle.pin = true;
            ptr.cordParticle.x = ptr.x;
            ptr.cordParticle.y = ptr.y;
            ptr.cordParticle.ox = ptr.x;
            ptr.cordParticle.oy = ptr.y;
            if (host.setPointerCapture) host.setPointerCapture(e.pointerId);
            return;
          }

          ptr.particle = findParticle(ptr.x, ptr.y);
          if (ptr.particle) {
            ptr.particleWasPinned = ptr.particle.pin;
            ptr.particle.pin = true;
            ptr.particle.x = ptr.x;
            ptr.particle.y = ptr.y;
            ptr.particle.ox = ptr.x;
            ptr.particle.oy = ptr.y;
            if (host.setPointerCapture) host.setPointerCapture(e.pointerId);
          }
        });
        host.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
          }
        });
        window.addEventListener("pointermove", onMove, { passive: true });
        window.addEventListener("pointerup", onUp);
        window.addEventListener("resize", onResize, { passive: true });

        function loop(now) {
          raf = requestAnimationFrame(loop);
          var elapsed = Math.min(50, now - lastT);
          lastT = now;
          acc += elapsed;
          var steps = 0;
          while (acc >= STEP_MS && steps < MAX_STEPS) {
            step(1);
            acc -= STEP_MS;
            steps++;

          if (steps === 0) step(Math.max(0.5, elapsed / STEP_MS));

          if (opening && performance.now() - openT > 1200) finishNow();
        }

        build();
        raf = requestAnimationFrame(loop);

      };

    </script>
    <script type="text/plain" id="legacy-clothintro-disabled">
      (function () {
        if (window.__amvClothIntro && window.__amvClothIntro()) return;
        var host = document.getElementById("clothintro");
        var canvas = document.getElementById("ci-canvas");
        function finishNow() { if (host && host.parentNode) host.remove(); document.body.classList.remove("ci-lock"); }
        if (!host || !canvas || !canvas.getContext) { finishNow(); return; }
        if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) { finishNow(); return; }

        var ctx = canvas.getContext("2d");
        var CHARS = "AMV WEB STUDIO SITES QUE VENDEM </> {} () => #01 λ ";
        var FABRIC = "#0a0f1c";
        var W = 0, H = 0, dpr = 1, SP = 24;
        var grav = 0.3, damp = 0.985, iters = 2;
        var curtains = [], cord, handle, bandImg = [];
        var opening = false, openT = 0, started = performance.now();
        var ptr = { x: -1, y: -1, grab: false };

        function mix(a, b, t) { return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t]; }
        var PUR = [168,85,247], CYA = [34,211,238], GRN = [0,255,136];
        function grad(t) { var c = t < 0.5 ? mix(PUR, CYA, t*2) : mix(CYA, GRN, (t-0.5)*2); return "rgb(" + (c[0]|0) + "," + (c[1]|0) + "," + (c[2]|0) + ")"; }

        // pré-renderiza os caracteres em 5 faixas de cor do gradiente (rápido)
        var BANDS = 5;
        function makeChars(fs) {
          bandImg = [];
          for (var bi = 0; bi < BANDS; bi++) {
            var col = grad(bi / (BANDS - 1)); var map = {}; var seen = {};
            for (var i = 0; i < CHARS.length; i++) {
              var ch = CHARS[i]; if (ch === " " || seen[ch]) continue; seen[ch] = 1;
              var s = Math.ceil(fs * 1.7);
              var off = document.createElement("canvas"); off.width = off.height = s;
              var o = off.getContext("2d");
              o.font = "700 " + fs + "px 'Plus Jakarta Sans', monospace";
              o.textAlign = "center"; o.textBaseline = "middle"; o.fillStyle = col;
              o.fillText(ch, s / 2, s / 2); map[ch] = off;
            }
            bandImg.push(map);
          }
        }

        function makeCurtain(x0, x1, dir) {
          var cols = Math.max(3, Math.round((x1 - x0) / SP) + 1);
          var rows = Math.ceil(H / SP) + 2;
          var hrest = (x1 - x0) / (cols - 1);
          var P = [];
          for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
              var x = x0 + c * hrest, y = r * SP;
              var band = Math.max(0, Math.min(BANDS - 1, Math.round((x / W) * (BANDS - 1))));
              P.push({ x: x, y: y, ox: x, oy: y, hx: x, pin: r === 0, ch: CHARS[(r * cols + c) % CHARS.length], band: band });
            }
          }
          return { P: P, cols: cols, rows: rows, hrest: hrest, dir: dir, open: 0 };
        }

        function build() {
          W = window.innerWidth; H = window.innerHeight;
          dpr = Math.min(2, window.devicePixelRatio || 1);
          canvas.width = W * dpr; canvas.height = H * dpr;
          canvas.style.width = W + "px"; canvas.style.height = H + "px";
          SP = W < 640 ? 30 : 24;
          makeChars(Math.round(SP * 1.02 * dpr));
          curtains = [makeCurtain(0, W / 2, -1), makeCurtain(W / 2, W, 1)];
          var cx = W - 40, segs = 14, sl = Math.min(H * 0.3, 260) / 14;
          cord = []; for (var i = 0; i < segs; i++) cord.push({ x: cx, y: i * sl, ox: cx, oy: i * sl, pin: i === 0, len: sl });
          handle = cord[cord.length - 1];
        }

        function verlet(a, g) {
          for (var i = 0; i < a.length; i++) { var p = a[i]; if (p.pin) continue;
            var vx = (p.x - p.ox) * damp, vy = (p.y - p.oy) * damp; p.ox = p.x; p.oy = p.y; p.x += vx; p.y += vy + g; }
        }
        function link(p1, p2, rest) {
          var dx = p2.x - p1.x, dy = p2.y - p1.y, d = Math.hypot(dx, dy) || 0.001, diff = ((rest - d) / d) * 0.5, ox = dx * diff, oy = dy * diff;
          if (!p1.pin) { p1.x -= ox; p1.y -= oy; } if (!p2.pin) { p2.x += ox; p2.y += oy; }
        }
        function ix(cur, r, c) { return r * cur.cols + c; }
        function solveCurtain(cur) {
          var P = cur.P;
          for (var r = 0; r < cur.rows; r++) for (var c = 0; c < cur.cols; c++) {
            var p = P[ix(cur, r, c)];
            if (c < cur.cols - 1) link(p, P[ix(cur, r, c + 1)], cur.hrest);
            if (r < cur.rows - 1) link(p, P[ix(cur, r + 1, c)], SP);
          }
        }
        function solveCord() { for (var i = 0; i < cord.length - 1; i++) link(cord[i], cord[i + 1], cord[i].len); }
        function repel() {
          if (ptr.x < 0) return; var R = 100, R2 = R * R;
          for (var k = 0; k < curtains.length; k++) { var P = curtains[k].P;
            for (var i = 0; i < P.length; i++) { var p = P[i]; if (p.pin) continue;
              var dx = p.x - ptr.x, dy = p.y - ptr.y, d2 = dx * dx + dy * dy;
              if (d2 < R2 && d2 > 1) { var f = (1 - d2 / R2) * 5, d = Math.sqrt(d2); p.x += dx / d * f; p.y += dy / d * f; } } }
        }

        function step() {
          for (var k = 0; k < curtains.length; k++) verlet(curtains[k].P, grav);
          verlet(cord, grav * 1.1);
          if (ptr.grab) { handle.x = ptr.x; handle.y = ptr.y; handle.ox = ptr.x; handle.oy = ptr.y; }
          repel();
          if (opening) {
            for (var k = 0; k < curtains.length; k++) {
              var cur = curtains[k]; cur.open = Math.min(1, cur.open + 0.02);
              var e = cur.open * cur.open;
              for (var c = 0; c < cur.cols; c++) { var p = cur.P[c]; p.x = p.hx + cur.dir * e * (W * 0.62); p.ox = p.x; }
            }
          }
          for (var it = 0; it < iters; it++) { for (var k = 0; k < curtains.length; k++) solveCurtain(curtains[k]); solveCord(); }
          if (!opening && handle.y > H * 0.55) open();
        }

        function open() { opening = true; openT = performance.now(); host.style.background = "transparent"; }

        function drawCurtain(cur) {
          var P = cur.P, rows = cur.rows, cols = cur.cols;
          // tecido (faixas verticais escuras que seguem a deformação)
          ctx.fillStyle = FABRIC;
          for (var c = 0; c < cols - 1; c++) {
            ctx.beginPath();
            var p = P[ix(cur, 0, c)]; ctx.moveTo(p.x, p.y);
            for (var r = 1; r < rows; r++) { p = P[ix(cur, r, c)]; ctx.lineTo(p.x, p.y); }
            for (var r2 = rows - 1; r2 >= 0; r2--) { p = P[ix(cur, r2, c + 1)]; ctx.lineTo(p.x, p.y); }
            ctx.closePath(); ctx.fill();
          }
          // letras (imagens já coloridas), giradas conforme o tecido
          for (var r3 = 0; r3 < rows; r3++) {
            for (var c2 = 0; c2 < cols; c2++) {
              var pp = P[ix(cur, r3, c2)]; var img = bandImg[pp.band][pp.ch]; if (!img) continue;
              var ang = 0;
              if (r3 < rows - 1) { var d = P[ix(cur, r3 + 1, c2)]; ang = Math.atan2(d.y - pp.y, d.x - pp.x) - Math.PI / 2; }
              var co = Math.cos(ang), si = Math.sin(ang);
              ctx.setTransform(co, si, -si, co, pp.x * dpr, pp.y * dpr);
              ctx.drawImage(img, -img.width / 2, -img.height / 2);
            }
          }
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function draw() {
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          for (var k = 0; k < curtains.length; k++) drawCurtain(curtains[k]);
          // corda (canto)
          ctx.beginPath(); ctx.moveTo(cord[0].x, cord[0].y);
          for (var i = 1; i < cord.length; i++) ctx.lineTo(cord[i].x, cord[i].y);
          ctx.strokeStyle = "rgba(245,247,255,0.85)"; ctx.lineWidth = 3; ctx.lineJoin = "round"; ctx.stroke();
          ctx.beginPath(); ctx.arc(handle.x, handle.y, 13, 0, Math.PI * 2); ctx.fillStyle = grad(0.5); ctx.fill();
          ctx.beginPath(); ctx.arc(handle.x, handle.y, 6, 0, Math.PI * 2); ctx.fillStyle = "#0a0f1c"; ctx.fill();
          if (!opening && !ptr.grab) {
            ctx.globalAlpha = 0.45 + 0.45 * Math.sin(performance.now() / 380);
            ctx.font = "700 14px 'Plus Jakarta Sans', sans-serif"; ctx.fillStyle = "#f5f7ff"; ctx.textAlign = "center";
            ctx.fillText("puxe ↓", handle.x, handle.y + 34); ctx.globalAlpha = 1;
          }
        }

        function pos(e) { var t = e.touches ? e.touches[0] : e; ptr.x = t.clientX; ptr.y = t.clientY; }
        host.addEventListener("pointerdown", function (e) { pos(e); var dx = ptr.x - handle.x, dy = ptr.y - handle.y; if (dx * dx + dy * dy < 55 * 55) ptr.grab = true; });
        window.addEventListener("pointermove", function (e) { pos(e); }, { passive: true });
        window.addEventListener("pointerup", function () { ptr.grab = false; });

        var raf;
        function loop() {
          raf = requestAnimationFrame(loop);
          step(); draw();
          if (opening && performance.now() - openT > 1200) { cancelAnimationFrame(raf); finishNow(); }
        }
        var rz;
        window.addEventListener("resize", function () { clearTimeout(rz); rz = setTimeout(function () { if (!opening) build(); }, 200); }, { passive: true });

        build(); loop();
      })();
    </script>
